- Electricity Generation by Source:
  - Coal:
        description: coal
        NRG: C0000X0350-0370,P1000
        note: includes Peat (P1000)
  - Oil:
      description: oil
      NRG: O4000XBIO
  - Natural Gas:
      description: fossil methane
      NRG: G3000
  - Biomass:
      description: solid biomass
      NRG: R5110-5150_W6000RI,R5160,R5300
      note: does not include any blended gases - includes Charcoal (as Biofuels does)
  - Biogas:
      description: gas from biogenic sources including landfill gas, sewer gas, and
          biogas (lower methane content than fossil natural gas)
      NRG: R5300
  - E-Methane:
      description: synthetic methane from renewable sources
  - Hydro:
      description: hydropower
      NRG: RA100
  - Solar:
      description: solar photovoltaics (PV)
      NRG: RA420
  - Wind:
      description: wind
      NRG: RA300
  - Geothermal:
      description: geothermal energy
      NRG: RA200
  - Waste:
      description: burning of waste
      NRG: W6100_6220
      note: Only non-renewable waste is included
  - Other Renewables:
      description: other renewables including hydrogen
      NRG: RA500
      note: This variable is used by Umweltbundesamt. tide wave ocean
