        description: transportation sector
        EB: FC_TRA_RAIL_E,FC_TRA_ROAD_E,FC_TRA_DAVI_E,FC_TRA_DNAVI_E,FC_TRA_NSP_E
        note: transport sector without pipeline transport (Rail, Road, d.aviation, d.navigation, else)
