- Final Energy Carrier:
    - Coal:
        description: coal EB:C0000X0350-0370,P1000
    - Oil:
        description: oil EB:O4000XBIO
    - Natural Gas:
        description: fossil methane EB:G3000
    - Electricity:
        description: electricity EB:E7000
    - Biomass:
        description: biomass including biomethane EB:BIOE
    - Biofuels:
        description: liquid fuels including bioethanol, biodiesel, other biogenic liquids and spent lye, Only pure biofuels; blended biofuels are not included EB:R5210P,R5220P,R5230P,R5290
    - E-Fuels:
        description: synthetic liquid fuels from renewable sources
    - Biogas:
        description: gas from biogenic sources including landfill gas, sewer gas, and biogas (lower methane content than fossil natural gas) EB:R5300
    - Biomethane:
        description: synthetic methane from biogenic sources
    - E-Methane:
        description: synthetic methane from renewable sources
    - Hydrogen:
        description: hydrogen produced from renewable electricity
    - Solar Thermal:
        description: solar thermal EB:RA410
    - Waste:
        description: energy from waste, Only non-renewable waste is included EB:W6100_6220
    - District Heat:
        description: heat delivered from district heating grids EB:H8000
    - Ambient Heat:
        description: ambient heat using heat pumps, geothermal and solar thermal energy EB:RA600
    - Other:
        description: other sources or carriers EB:C0350-0370,R5110-5150_W6000RI,R5160,R5210B,R5220B,R5230B,RA100,RA300,RA420,N900H,RA500,S2000,W6210

# aggregate categories where detailed reporting is not possible
    - Renewables:
        description: renewables including biomass and green hydrogen
        note: This variable should only be used if separate reporting of renewables is
          not possible.
    - Renewables incl. Ambient Heat:
        description: renewables including biomass, green hydrogen and ambient heat
        note: This variable should only be used if separate reporting of renewables is
          not possible.
